version: "3.8"

services:
  nginx:
    image: nginx:latest
    container_name: hypertube-nginx
    ports:
     - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
    - backend
    - frontend
    networks:
     - hypertube_default

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: hypertube-jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - AUTO_UPDATE=true
    volumes:
      - ./jackett/config:/config
      - ./jackett/downloads:/downloads
    ports:
      - "9117:9117"
    restart: unless-stopped
    networks:
      - hypertube_default

  db:
    image: postgres:15
    container_name: hypertube-db
    restart: always
    environment:
      POSTGRES_DB: hypertube_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - .env
    networks:
      - hypertube_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d hypertube_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hypertube-backend
    command: >
      sh -c "apt-get update &&
             apt-get install -y ffmpeg &&
             python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 hypertube.wsgi --reload"
    depends_on:
      db:
        condition: service_healthy
      jackett:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=1
      - DATABASE_HOST=db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./downloads:/app/downloads
    env_file:
      - .env
    networks:
      - hypertube_default

  frontend:
    build: ./frontend
    container_name: hypertube-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - ./.env:/app/.env
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    networks:
      - hypertube_default

volumes:
  postgres_data:

networks:
  hypertube_default:
    driver: bridge
